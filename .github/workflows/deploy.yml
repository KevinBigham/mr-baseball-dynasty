name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: |
          npx tsc -p packages/contracts/tsconfig.json --noEmit
          npx tsc -p packages/design-tokens/tsconfig.json --noEmit
          npx tsc -p packages/sim-core/tsconfig.json --noEmit
          npx tsc -p packages/sim-worker/tsconfig.json --noEmit
          npx tsc -p packages/ui/tsconfig.json --noEmit
          npx tsc -p apps/web/tsconfig.json --noEmit

      - name: Run tests
        run: |
          cd packages/sim-core && npx vitest run && cd ../..
          cd packages/sim-worker && npx vitest run && cd ../..

      - name: Build
        run: cd apps/web && npx vite build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
